name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx expo lint